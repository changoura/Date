<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kino Date?</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb199);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      color: white;
    }

    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 28px;
      animation: float 8s linear infinite;
      opacity: 0.75;
    }

    .heart:nth-child(1) { left: 10%; animation-delay: 0s; }
    .heart:nth-child(2) { left: 25%; animation-delay: 2s; }
    .heart:nth-child(3) { left: 45%; animation-delay: 4s; }
    .heart:nth-child(4) { left: 65%; animation-delay: 1s; }
    .heart:nth-child(5) { left: 85%; animation-delay: 3s; }

    @keyframes float {
      0% {
        bottom: -50px;
        transform: translateX(0) scale(1);
      }
      50% {
        transform: translateX(30px) scale(1.3);
      }
      100% {
        bottom: 110%;
        transform: translateX(-30px) scale(1);
      }
    }

    .box {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 420px;
      padding: 35px 28px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(15px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .emoji {
      font-size: 55px;
      animation: pulse 1.3s infinite;
    }

    h1 {
      font-size: 30px;
      margin: 15px 0 10px;
    }

    h2 {
      font-size: 25px;
      margin: 15px 0;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      margin: 10px 0;
    }

    .buttons {
      margin-top: 28px;
      position: relative;
      height: 95px;
    }

    button {
      padding: 14px 24px;
      border: none;
      border-radius: 40px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    #yes {
      background: white;
      color: #ff4f81;
      font-weight: bold;
      position: absolute;
      left: 25px;
      top: 20px;
    }

    #no {
      background: rgba(255, 255, 255, 0.75);
      color: #333;
      position: absolute;
      right: 25px;
      top: 20px;
    }

    #yes:hover {
      transform: scale(1.08);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>
  <div class="background">
    <div class="heart">❤️</div>
    <div class="heart">🍿</div>
    <div class="heart">🎬</
