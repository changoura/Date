<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yaren ❤️</title>

<style>

body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at top,#2b2b2b,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
    color:white;
    padding:20px;
}

.stars{
    position:fixed;
    inset:0;
    background-image:
    radial-gradient(white 1px,transparent 1px),
    radial-gradient(white 1px,transparent 1px);
    background-size:60px 60px,100px 100px;
    opacity:.22;
}

.spotlight{
    position:fixed;
    width:420px;
    height:420px;
    background:rgba(255,255,255,.13);
    border-radius:50%;
    filter:blur(30px);
    top:-100px;
    left:50%;
    transform:translateX(-50%);
}

.box{
    position:relative;
    z-index:2;
    width:100%;
    max-width:430px;
    padding:28px 22px;
    border-radius:30px;
    background:rgba(255,255,255,.09);
    box-shadow:0 15px 45px rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.22);
}

.photo{
    width:190px;
    height:190px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid #ffdf6c;
    box-shadow:0 0 30px rgba(255,223,108,.45);
    margin-bottom:15px;
}

h1{
    font-size:30px;
    margin:10px 0;
}

h2{
    font-size:24px;
    color:#ffdf6c;
    margin:15px 0;
}

p{
    font-size:17px;
    line-height:1.5;
    color:#eee;
}

.dance{
    font-size:45px;
    margin:15px 0;
    animation:dance .8s infinite alternate;
}

@keyframes dance{
    from{
        transform:rotate(-8deg) translateX(-4px);
    }
    to{
        transform:rotate(8deg) translateX(4px);
    }
}

.buttons{
    margin-top:25px;
    position:relative;
    height:95px;
}

button{
    border:none;
    border-radius:35px;
    padding:14px 20px;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}

#yes{
    background:#ffdf6c;
    color:#111;
    font-weight:bold;
    position:absolute;
    left:10px;
    top:20px;
}

#no{
    background:white;
    color:#111;
    position:absolute;
    right:10px;
    top:20px;
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="spotlight"></div>

<div class="box">

<img src="IMG_2254.jpeg" class="photo">

<h1>Hey Yaren ❤️</h1>

<p>
Ich habe eine kleine Überraschung für dich...
</p>

<div class="dance">🕺✨🎬</div>

<h2>
Willst du heute mit mir in den Michael-Jackson-Film?
</h2>

<p>
Ein bisschen Popcorn 🍿,<br>
ein bisschen Michael Jackson 🕺<br>
und ganz viel Zeit mit dir ❤️
</p>

<p style="color:#ffdf6c;font-weight:bold;">
Ich würde mich riesig freuen.
</p>

<div class="buttons">
    <button id="yes" onclick="sayYes()">
        Ja, let's go 💛
    </button>

    <button id="no"
        onclick="moveNo()"
        onmouseover="moveNo()">
        Nein
    </button>
</div>

</div>

<script>

let yesSize = 1;

const noTexts = [
    "Bist du sicher? 😳",
    "Wirklich? 🥺",
    "Denk nochmal nach ❤️",
    "Komm schon 😌",
    "Der Film wird gut 🍿",
    "Yaren bitte 😭",
    "Nur ein kleiner Film 🥹"
];

function sayYes(){

document.body.innerHTML = `

<div style="
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#2b2b2b,#000);
padding:20px;
color:white;
">

<div style="
background:rgba(255,255,255,.09);
width:100%;
max-width:430px;
padding:30px 22px;
border-radius:30px;
box-shadow:0 15px 45px rgba(255,255,255,.14);
border:1px solid rgba(255,255,255,.22);
">

<img
src='IMG_2254.jpeg'
style='
width:190px;
height:190px;
object-fit:cover;
border-radius:50%;
border:5px solid #ffdf6c;
box-shadow:0 0 30px rgba(255,223,108,.45);
margin-bottom:15px;
'>

<div style="font-size:55px;">
🕺🎬🍿
</div>

<h1 style="color:#ffdf6c;">
HEE HEE! 🕺💛
</h1>

<p style="font-size:22px;">
Mission erfolgreich ❤️
</p>

<p style="font-size:18px;">
Yaren + Adam + Michael Jackson + Popcorn
</p>

<p style="
font-size:18px;
color:#ffdf6c;
">
= perfekter Abend ✨
</p>

<p style="font-size:28px;">
🍿❤️🎬🕺
</p>

</div>
</div>
`;
}

function moveNo(){

const noButton =
document.getElementById("no");

const yesButton =
document.getElementById("yes");

const x = Math.random()*220;
const y = Math.random()*60;

noButton.style.left = x + "px";
noButton.style.top = y + "px";
noButton.style.right = "auto";

noButton.innerText =
noTexts[Math.floor(Math.random()*noTexts.length)];

yesSize += 0.1;

yesButton.style.transform =
"scale(" + yesSize + ")";
}

</script>

</body>
</html>
