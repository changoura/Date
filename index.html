<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kino Date?</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff6f91, #ff9671);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .box {
      background: white;
      width: 90%;
      max-width: 390px;
      padding: 35px 25px;
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    }

    .emoji {
      font-size: 55px;
      margin-bottom: 10px;
    }

    h1 {
      color: #ff4f81;
      font-size: 30px;
      margin: 10px 0;
    }

    h2 {
      color: #333;
      font-size: 25px;
      margin: 15px 0;
    }

    p {
      color: #555;
      font-size: 18px;
      line-height: 1.5;
    }

    .buttons {
      margin-top: 25px;
      position: relative;
      height: 90px;
    }

    button {
      border: none;
      border-radius: 35px;
      padding: 14px 24px;
      font-size: 17px;
      cursor: pointer;
      transition: 0.25s;
    }

    #yes {
      background: #ff4f81;
      color: white;
      font-weight: bold;
      position: absolute;
      left: 25px;
      top: 20px;
    }

    #no {
      background: #eeeeee;
      color: #333;
      position: absolute;
      right: 25px;
      top: 20px;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="emoji">🍿🎬❤️</div>

    <h1>Hey meine Liebe</h1>

    <p>Ich habe eine kleine Frage an dich...</p>

    <h2>Willst du heute mit mir ins Kino gehen?</h2>

    <p>Ein guter Film, Popcorn und du. Mehr brauche ich heute nicht. ❤️</p>

    <div class="buttons">
      <button id="yes" onclick="sayYes()">Ja, natürlich 💕</button>
      <button id="no" onclick="moveNo()" onmouseover="moveNo()">Nein</button>
    </div>
  </div>

  <script>
    let yesSize = 1;

    function sayYes() {
      document.body.innerHTML = `
        <div style="
          min-height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          text-align:center;
          font-family:Arial, sans-serif;
          background:linear-gradient(135deg,#ff6f91,#ff9671);
        ">
          <div style="
            background:white;
            width:90%;
            max-width:390px;
            padding:35px 25px;
            border-radius:30px;
            box-shadow:0 15px 35px rgba(0,0,0,0.25);
          ">
            <div style="font-size:60px;">❤️🍿🎬</div>
            <h1 style="color:#ff4f81;">Jaaaa ❤️</h1>
            <p style="font-size:20px;color:#555;">Dann ist es ein Date.</p>
            <p style="font-size:18px;color:#555;">Ich freue mich auf heute Abend mit dir.</p>
          </div>
        </div>
      `;
    }

    function moveNo() {
      const noButton = document.getElementById("no");
      const yesButton = document.getElementById("yes");

      const x = Math.random() * 210;
      const y = Math.random() * 55;

      noButton.style.left = x + "px";
      noButton.style.top = y + "px";
      noButton.style.right = "auto";

      yesSize += 0.1;
      yesButton.style.transform = "scale(" + yesSize + ")";
    }
  </script>

</body>
</html>
