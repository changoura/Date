<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Date?</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #2b2b2b, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      color: white;
    }

    .spotlight {
      position: fixed;
      width: 350px;
      height: 350px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      filter: blur(20px);
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
    }

    .box {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.08);
      width: 90%;
      max-width: 420px;
      padding: 35px 25px;
      border-radius: 30px;
      box-shadow: 0 15px 40px rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .emoji {
      font-size: 58px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 30px;
      margin: 10px 0;
      color: #ffffff;
    }

    h2 {
      font-size: 24px;
      color: #ffdf6c;
      margin: 15px 0;
    }

    p {
      color: #eeeeee;
      font-size: 18px;
      line-height: 1.5;
    }

    .mj {
      font-size: 42px;
      margin: 15px 0;
      animation: dance 1s infinite alternate;
    }

    @keyframes dance {
      from { transform: rotate(-7deg) translateX(-4px); }
      to { transform: rotate(7deg) translateX(4px); }
    }

    .buttons {
      margin-top: 25px;
      position: relative;
      height: 95px;
    }

    button {
      border: none;
      border-radius: 35px;
      padding: 14px 22px;
      font-size: 17px;
      cursor: pointer;
      transition: 0.25s;
    }

    #yes {
      background: #ffdf6c;
      color: #111;
      font-weight: bold;
      position: absolute;
      left: 20px;
      top: 20px;
    }

    #no {
      background: white;
      color: #111;
      position: absolute;
      right: 20px;
      top: 20px;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 60px 60px, 100px 100px;
      opacity: 0.25;
    }
  </style>
</head>

<body>
  <div class="stars"></div>
  <div class="spotlight"></div>

  <div class="box">
    <div class="emoji">🎬🍿✨</div>

    <h1>Hey meine Liebe ❤️</h1>

    <p>Ich habe heute eine ganz wichtige Film-Frage an dich...</p>

    <div class="mj">🕺</div>

    <h2>Willst du heute mit mir in den Michael-Jackson-Film gehen?</h2>

    <p>Popcorn, Kino, Musik und du neben mir. Das wäre heute mein perfekter Abend. ❤️</p>

    <div class="buttons">
      <button id="yes" onclick="sayYes()">Ja, let's go 💛</button>
      <button id="no" onclick="moveNo()" onmouseover="moveNo()">Nein</button>
    </div>
  </div>

  <script>
    let yesSize = 1;

    function sayYes() {
      document.body.innerHTML = `
        <div style="
          min-height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          text-align:center;
          font-family:Arial, sans-serif;
          background:radial-gradient(circle at top,#2b2b2b,#000);
          color:white;
          padding:20px;
        ">
          <div style="
            background:rgba(255,255,255,0.08);
            width:90%;
            max-width:420px;
            padding:35px 25px;
            border-radius:30px;
            box-shadow:0 15px 40px rgba(255,255,255,0.15);
            border:1px solid rgba(255,255,255,0.2);
          ">
            <div style="font-size:60px;">🕺🎬🍿</div>
            <h1 style="color:#ffdf6c;">Hee-hee, jaaa! 💛</h1>
            <p style="font-size:20px;color:#eee;">Dann ist es offiziell ein Kino-Date.</p>
            <p style="font-size:18px;color:#eee;">Ich freue mich auf den Abend mit dir. ❤️</p>
          </div>
        </div>
      `;
    }

    function moveNo() {
      const noButton = document.getElementById("no");
      const yesButton = document.getElementById("yes");

      const x = Math.random() * 220;
      const y = Math.random() * 60;

      noButton.style.left = x + "px";
      noButton.style.top = y + "px";
      noButton.style.right = "auto";

      yesSize += 0.1;
      yesButton.style.transform = "scale(" + yesSize + ")";
    }
  </script>
</body>
</html>
